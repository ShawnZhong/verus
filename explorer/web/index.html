<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>verus-explorer</title>
  <style>
    body {
      font: 14px/1.45 ui-monospace, Menlo, Consolas, monospace;
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    h1 {
      font-size: 1.25rem;
    }

    button {
      font: inherit;
      padding: .5em 1em;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .6;
    }

    pre {
      background: #f5f5f5;
      padding: 1em;
      border-radius: 6px;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .ok {
      color: #087a3c;
      font-weight: bold;
    }

    .bad {
      color: #b42318;
      font-weight: bold;
    }

    .muted {
      color: #666;
    }
  </style>
</head>

<body>

  <h1>verus-explorer</h1>
  <p class="muted">Real <code>vir</code> + <code>air</code> (from this Verus tree) compiled to
    wasm32, driving a self-hosted single-threaded Z3 wasm for verification.
    No SharedArrayBuffer, no COOP/COEP — works from any static host.
    The button runs the hand-rolled <code>forall x. x + 0 == x</code> proof end-to-end.</p>

  <button id="run">Run POC</button>
  <pre id="out">Ready.</pre>

  <!-- Emscripten MODULARIZE output: defines globalThis.initZ3(config). -->
  <script src="./z3/z3.js"></script>

  <script>
    // Install globalThis.__verusExplorerZ3Eval on top of initZ3. The Rust wasm
    // module calls this through wasm-bindgen.
    (() => {
      let _z3Promise = null;
      const _initZ3 = () => _z3Promise ??= globalThis.initZ3({
        locateFile: (p) => new URL('./z3/' + p, location.href).toString(),
      }).then((Module) => {
        // One persistent Z3 context; Z3_eval_smtlib2_string accepts a full
        // self-contained SMT-LIB program per call.
        const cfg = Module.ccall('Z3_mk_config', 'number', [], []);
        const ctx = Module.ccall('Z3_mk_context', 'number', ['number'], [cfg]);
        Module.ccall('Z3_del_config', null, ['number'], [cfg]);
        return { Module, ctx };
      });
      globalThis.__verusExplorerZ3Eval = async (script) => {
        const { Module, ctx } = await _initZ3();
        // ccall 'string' marshals in and reads the returned pointer as a JS
        // string; Z3 owns the buffer, so we do not free it.
        return Module.ccall('Z3_eval_smtlib2_string', 'string', ['number', 'string'], [ctx, script]);
      };
    })();
  </script>

  <script type="module">
    import init, { run_poc } from './pkg/verus_explorer.js';

    const out = document.getElementById('out');
    const log = (line, cls) => {
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = line + '\n';
      out.appendChild(span);
    };

    document.getElementById('run').addEventListener('click', async () => {
      out.textContent = '';
      try {
        log('Loading wasm...');
        await init();
        log('Calling run_poc()...');
        const r = await run_poc();

        log('VIR  : ' + r.vir);
        log('AIR  : ' + r.air);
        if (r.error) {
          log('');
          log('z3 failed: ' + r.error, 'bad');
          console.error({ error: r.error, vir: r.vir, air: r.air });
          return;
        }
        log('SMT  : ' + JSON.stringify(r.smt_results));
        log('');
        if (r.verified) {
          log('verified: true — POC succeeded', 'ok');
          console.log({ verified: true, ...r });
        } else {
          log('verified: false — POC failed', 'bad');
          console.error({ verified: false, ...r });
        }
      } catch (e) {
        log('Driver crashed: ' + (e?.message ?? e), 'bad');
        console.error(e);
      }
    });
  </script>

</body>

</html>
